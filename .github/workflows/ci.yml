name: CI

on:
  push:
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - ".github/workflows/ci.yml"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        lua-version: ["5.1", "5.2", "5.3", "5.4", "5.5", "luajit"]

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v6

      - uses: leafo/gh-actions-lua@v13
        with:
          luaVersion: ${{ matrix.lua-version }}

      - uses: leafo/gh-actions-luarocks@v6

      - name: Build
        run: luarocks make rockspecs/timeutil-scm-1.rockspec

      - name: Test
        run: lua tests/timeutil.test.lua
